name: Abiogenesis Canon

on:
  push:
    branches:
      - main
      - ciel_abiogenesis_canon
  pull_request:

jobs:
  canon-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install minimal test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest numpy pandas matplotlib scipy

      - name: Audit canonical abiogenesis surface
        run: |
          python scripts/audit_abiogenesis_surface.py
          python scripts/check_public_semantics.py

      - name: Run canonical smoke tests
        run: |
          pytest -q tests/test_abiogenesis_canon.py tests/test_abiogenesis_workflows.py
